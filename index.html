<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Vocab Builder — HSK1 / HSK2 / HSK3 / HSK4 / ES1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Chinese Vocab Builder</h1>

    <div class="tab-row">
      <button class="tab-btn active" data-tab="add">Add words</button>
      <button class="tab-btn" data-tab="quiz">Quiz me</button>
      <button class="tab-btn" data-tab="progress">Progress</button>
    </div>

    <section id="addPane">
      <p class="stats-line" id="statsLine"></p>

      <div class="add-form">
        <input id="inChar" placeholder="你好">
        <input id="inPinyin" placeholder="nǐhǎo">
        <input id="inMeaning" placeholder="hello">
        <input id="inTag" placeholder="my-list" list="tagOptions">
        <datalist id="tagOptions"></datalist>
        <button id="addBtn">+</button>
      </div>
      <p class="msg" id="addMsg"></p>

      <div class="list-controls">
        <input id="searchWord" type="search" placeholder="Search all lists — character, pinyin (tone marks optional), or meaning…">
        <div class="tag-filter-row" id="listFilterRow"></div>
        <label class="overlap-toggle">
          <input type="checkbox" id="overlapOnly">
          Show only words that overlap between lists
          <span class="overlap-count" id="overlapCount"></span>
        </label>
      </div>
      <p class="count-label" id="countLabel">0 words saved</p>
      <div class="word-list" id="wordList"></div>
    </section>

    <section id="quizPane" class="hidden">
      <p class="section-label">Practice from:</p>
      <div class="tag-filter-row" id="tagFilterRow"></div>
      <p class="section-label">Round size:</p>
      <div class="tag-filter-row" id="roundSizeRow"></div>
      <p class="pool-count" id="poolCount"></p>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="scoreOut">0 / 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Streak</div>
          <div class="stat-value" id="streakOut">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Seen</div>
          <div class="stat-value" id="seenCount">0 / 0</div>
        </div>
      </div>

      <div class="question-box" id="questionBox">
        <div class="q-main" id="qMain">-</div>
        <p class="feedback" id="feedback"></p>
      </div>

      <div class="congrats-box hidden" id="congratsBox">
        <div class="congrats-emoji">🎉</div>
        <h2>You've seen every word in this list!</h2>
        <p class="congrats-summary" id="congratsSummary"></p>
        <div class="congrats-actions">
          <button id="resetPoolBtn" class="next-btn">Reset &amp; play again</button>
          <button id="keepReviewingBtn">Keep reviewing</button>
        </div>
      </div>

      <div class="options" id="options"></div>
      <button id="dontKnowBtn" class="dont-know-btn hidden">I don't know</button>
      <button id="nextBtn" class="next-btn hidden">Next question →</button>
      <p class="not-enough" id="notEnough"></p>
    </section>

    <section id="progressPane" class="hidden">
      <p class="section-label">Filter by list:</p>
      <div class="tag-filter-row" id="progressFilterRow"></div>
      <button id="resetProgressBtn" class="reset-progress-btn">Reset all progress</button>
      <p class="section-label">Words you've gotten wrong</p>
      <div class="word-list" id="wrongList"></div>
      <p class="section-label" style="margin-top:20px;">Words you've marked "I don't know"</p>
      <div class="word-list" id="dontKnowList"></div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
